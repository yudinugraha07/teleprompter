<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Teleprompter</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: rgba(10, 10, 10, 0.72);
        --panel-solid: #121212;
        --accent: #ff5c3d; /* tally-light red-orange */
        --accent-dim: rgba(255, 92, 61, 0.35);
        --text: #f5f2ea;
        --text-dim: #9a958c;
        --line: rgba(245, 242, 234, 0.12);
        --mono: "SF Mono", "Courier New", monospace;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        overflow: hidden;
        overscroll-behavior: none;
        position: fixed;
        inset: 0;
      }

      #camera {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
        z-index: 0;
      }
      #camera.hidden {
        display: none;
      }

      #camera-fallback {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        padding: 24px;
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        font-family: var(--mono);
      }
      #camera-fallback.hidden {
        display: none;
      }

      /* Tally light */
      #tally {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0) + 14px);
        left: 14px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-dim);
        z-index: 30;
        transition: background 0.2s;
      }
      #tally.live {
        background: var(--accent);
        box-shadow: 0 0 10px 2px var(--accent-dim);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.45;
        }
      }

      /* Scroll text overlay */
      #stage {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        pointer-events: auto;
      }
      #track {
        width: 100%;
        padding: 0 22px;
        will-change: transform;
        transform: translateY(0);
      }
      #track.mirror {
        transform: scaleX(-1);
      }
      .line-block {
        background: var(--panel);
        backdrop-filter: blur(2px);
        padding: 14px 18px;
        border-radius: 10px;
      }
      #script-text {
        font-family: var(--sans);
        font-weight: 700;
        line-height: 1.5;
        color: var(--text);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        white-space: pre-wrap;
        word-wrap: break-word;
        margin: 0;
      }

      /* Center reading guide line */
      #guide {
        position: fixed;
        left: 0;
        right: 0;
        top: 38%;
        height: 1px;
        background: var(--accent-dim);
        z-index: 11;
        pointer-events: none;
        display: none;
      }
      #guide.on {
        display: block;
      }

      /* Start countdown */
      #countdown {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        font-family: var(--sans);
        font-weight: 700;
        font-size: 120px;
        color: var(--text);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      #countdown.show {
        display: flex;
      }

      /* Top bar (minimal, shows on tap) */
      #topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 40;
        padding: calc(env(safe-area-inset-top, 0) + 10px) 14px 10px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.65),
          transparent
        );
        transition:
          opacity 0.25s,
          transform 0.25s;
      }
      #topbar.hide {
        opacity: 0;
        transform: translateY(-100%);
        pointer-events: none;
      }
      #status-label {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--text-dim);
        text-transform: uppercase;
      }
      .icon-btn {
        background: rgba(18, 18, 18, 0.6);
        border: 1px solid var(--line);
        color: var(--text);
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      #topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #record-btn.recording {
        background: var(--accent);
        color: #120705;
        border-color: var(--accent);
        animation: pulse 1.4s ease-in-out infinite;
      }

      /* Bottom control dock */
      #dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        padding: 14px 14px calc(env(safe-area-inset-bottom, 0) + 14px);
        background: linear-gradient(to top, rgba(0, 0, 0, 0.78), transparent);
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition:
          opacity 0.25s,
          transform 0.25s;
      }
      #dock.hide {
        opacity: 0;
        transform: translateY(100%);
        pointer-events: none;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .slider-row {
        background: var(--panel-solid);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 14px;
      }
      .slider-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        text-transform: uppercase;
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .value-wrap {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .value-input {
        width: 34px;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--line);
        color: var(--text-dim);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-align: right;
        padding: 0 0 1px;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .value-input::-webkit-outer-spin-button,
      .value-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }
      .value-input:focus {
        color: var(--text);
        border-bottom-color: var(--accent);
        outline: none;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 26px;
        background: transparent;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 3px;
        background: var(--line);
        border-radius: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        margin-top: -8.5px;
        box-shadow: 0 0 0 4px rgba(255, 92, 61, 0.18);
      }

      .stepper-btn {
        display: none;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--panel-solid);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 17px;
        line-height: 1;
        align-items: center;
        justify-content: center;
        flex: none;
      }
      .stepper-btn:active {
        background: var(--accent-dim);
        border-color: var(--accent);
      }

      /* Small-height landscape phones: swap sliders for +/- steppers
         so the control dock doesn't crowd out the script preview. */
      @media (orientation: landscape) and (max-height: 500px) {
        #dock {
          gap: 6px;
          padding: 8px 14px calc(env(safe-area-inset-bottom, 0) + 8px);
        }
        .slider-row {
          padding: 6px 10px;
        }
        .slider-label {
          margin-bottom: 0;
        }
        .slider-row input[type="range"] {
          display: none;
        }
        .stepper-btn {
          display: flex;
        }
        .controls-row {
          display: flex;
          flex-direction: row;
          gap: 6px;
        }
        .controls-row .slider-row {
          flex: 1;
          min-width: 0;
        }
      }

      #main-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #play-btn {
        flex: 1;
        background: var(--accent);
        color: #120705;
        border: none;
        border-radius: 14px;
        height: 54px;
        font-family: var(--sans);
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      #play-btn.playing {
        background: var(--panel-solid);
        color: var(--accent);
        border: 1px solid var(--accent-dim);
      }
      .sq-btn {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        background: var(--panel-solid);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sq-btn.active {
        color: var(--accent);
        border-color: var(--accent-dim);
      }

      /* Editor sheet */
      #editor {
        position: fixed;
        inset: 0;
        z-index: 60;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.28s ease;
      }
      #editor.open {
        transform: translateY(0);
      }
      #editor-header {
        padding: calc(env(safe-area-inset-top, 0) + 16px) 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
      }
      #editor-header h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      #editor-header .sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 2px;
      }
      #done-btn {
        background: var(--accent);
        color: #120705;
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
      }
      #editor-header .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #load-btn {
        background: var(--panel-solid);
        color: var(--text);
        border: 1px solid var(--line);
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 13px;
      }
      #load-error {
        display: none;
        padding: 8px 16px 0;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent);
      }
      #load-error.show {
        display: block;
      }
      #script-input {
        flex: 1;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        border: none;
        outline: none;
        resize: none;
        padding: 18px 16px calc(env(safe-area-inset-bottom, 0) + 18px);
        font-family: var(--sans);
        font-size: 19px;
        line-height: 1.55;
      }
      #script-input::placeholder {
        color: var(--text-dim);
      }

      /* Font size row inside editor footer */
      #editor-footer {
        display: flex;
        gap: 10px;
        padding: 10px 16px calc(env(safe-area-inset-bottom, 0) + 12px);
        border-top: 1px solid var(--line);
      }
      #editor-footer .slider-row {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <video id="camera" autoplay playsinline muted></video>
    <div id="camera-fallback" class="hidden">
      <div style="font-size: 22px">◎</div>
      <div id="fallback-msg">
        Camera permission is needed to show the preview.<br />Tap the camera
        button below to try again.
      </div>
    </div>

    <div id="tally"></div>
    <div id="guide"></div>
    <div id="countdown"></div>

    <div id="stage">
      <div id="track">
        <div class="line-block">
          <p id="script-text">
            Tap the pencil icon below to paste your script here.
          </p>
        </div>
      </div>
    </div>

    <div id="topbar">
      <span id="status-label">Ready</span>
      <div id="topbar-actions">
        <button class="icon-btn" id="record-btn" aria-label="Record">⏺</button>
        <button class="icon-btn" id="fullscreen-btn" aria-label="Fullscreen">
          ⛶
        </button>
      </div>
    </div>

    <div id="dock">
      <div class="controls-row">
      <div class="slider-row">
        <div class="slider-label">
          <span>Speed</span>
          <span class="value-wrap">
            <button
              class="stepper-btn"
              data-target="speed-input"
              data-delta="-2"
              aria-label="Decrease speed"
            >
              −
            </button>
            <input
              type="number"
              class="value-input"
              id="speed-input"
              min="0.2"
              max="3.3"
              step="0.1"
              value="1.0"
              inputmode="decimal"
            />×
            <button
              class="stepper-btn"
              data-target="speed-input"
              data-delta="2"
              aria-label="Increase speed"
            >
              +
            </button>
          </span>
        </div>
        <input
          type="range"
          id="speed-slider"
          min="1"
          max="20"
          value="6"
          step="1"
        />
      </div>
      <div class="slider-row">
        <div class="slider-label">
          <span>Text size</span>
          <span class="value-wrap">
            <button
              class="stepper-btn"
              data-target="size-input"
              data-delta="-1"
              aria-label="Decrease text size"
            >
              −
            </button>
            <input
              type="number"
              class="value-input"
              id="size-input"
              min="18"
              max="64"
              step="1"
              value="32"
              inputmode="numeric"
            />px
            <button
              class="stepper-btn"
              data-target="size-input"
              data-delta="1"
              aria-label="Increase text size"
            >
              +
            </button>
          </span>
        </div>
        <input
          type="range"
          id="size-slider"
          min="18"
          max="64"
          value="32"
          step="1"
        />
      </div>
      </div>
      <div id="main-controls">
        <button class="sq-btn" id="edit-btn" aria-label="Edit script">✎</button>
        <button class="sq-btn" id="mirror-btn" aria-label="Mirror">⇋</button>
        <button class="sq-btn" id="flip-cam-btn" aria-label="Switch camera">
          ⟲
        </button>
        <button class="sq-btn" id="restart-btn" aria-label="Restart">
          ⏮
        </button>
        <button id="play-btn">
          <span id="play-icon">▶</span><span id="play-text">Start</span>
        </button>
        <button class="sq-btn" id="guide-btn" aria-label="Guide line">
          —
        </button>
      </div>
    </div>

    <div id="editor">
      <div id="editor-header">
        <div>
          <h1>Script</h1>
          <div class="sub">Paste or type your text</div>
        </div>
        <div class="header-actions">
          <input
            type="file"
            id="file-input"
            accept=".txt,.md,.docx,text/plain,text/markdown,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            hidden
          />
          <button id="load-btn">Load file</button>
          <button id="done-btn">Done</button>
        </div>
      </div>
      <div id="load-error"></div>
      <textarea
        id="script-input"
        placeholder="Paste your script here..."
      ></textarea>
      <div id="editor-footer">
        <div class="slider-row">
          <div class="slider-label">
            <span>Text size</span>
            <span class="value-wrap">
              <button
                class="stepper-btn"
                data-target="size-input-2"
                data-delta="-1"
                aria-label="Decrease text size"
              >
                −
              </button>
              <input
                type="number"
                class="value-input"
                id="size-input-2"
                min="18"
                max="64"
                step="1"
                value="32"
                inputmode="numeric"
              />px
              <button
                class="stepper-btn"
                data-target="size-input-2"
                data-delta="1"
                aria-label="Increase text size"
              >
                +
              </button>
            </span>
          </div>
          <input
            type="range"
            id="size-slider-2"
            min="18"
            max="64"
            value="32"
            step="1"
          />
        </div>
      </div>
    </div>

    <script>
      (function () {
        const track = document.getElementById("track");
        const scriptText = document.getElementById("script-text");
        const playBtn = document.getElementById("play-btn");
        const playIcon = document.getElementById("play-icon");
        const playText = document.getElementById("play-text");
        const speedSlider = document.getElementById("speed-slider");
        const speedInput = document.getElementById("speed-input");
        const sizeSlider = document.getElementById("size-slider");
        const sizeInput = document.getElementById("size-input");
        const sizeSlider2 = document.getElementById("size-slider-2");
        const sizeInput2 = document.getElementById("size-input-2");
        const mirrorBtn = document.getElementById("mirror-btn");
        const guideBtn = document.getElementById("guide-btn");
        const guide = document.getElementById("guide");
        const countdown = document.getElementById("countdown");
        const editBtn = document.getElementById("edit-btn");
        const editor = document.getElementById("editor");
        const doneBtn = document.getElementById("done-btn");
        const scriptInput = document.getElementById("script-input");
        const loadBtn = document.getElementById("load-btn");
        const fileInput = document.getElementById("file-input");
        const loadError = document.getElementById("load-error");
        const flipCamBtn = document.getElementById("flip-cam-btn");
        const restartBtn = document.getElementById("restart-btn");
        const camera = document.getElementById("camera");
        const cameraFallback = document.getElementById("camera-fallback");
        const fallbackMsg = document.getElementById("fallback-msg");
        const tally = document.getElementById("tally");
        const topbar = document.getElementById("topbar");
        const dock = document.getElementById("dock");
        const statusLabel = document.getElementById("status-label");
        const fullscreenBtn = document.getElementById("fullscreen-btn");
        const stage = document.getElementById("stage");
        const recordBtn = document.getElementById("record-btn");

        let playing = false;
        let scrollY = 0;
        let rafId = null;
        let lastTs = null;
        let facingMode = "user";
        let currentStream = null;
        let controlsVisible = true;
        let hideTimer = null;
        let countdownTimer = null;
        let needsCountdown = true;
        let recording = false;
        let mediaRecorder = null;
        let recordedChunks = [];

        // ---- Camera ----
        function applyStream(stream) {
          currentStream = stream;
          camera.srcObject = stream;
          camera.classList.remove("hidden");
          cameraFallback.classList.add("hidden");
          camera.style.transform =
            facingMode === "user" ? "scaleX(-1)" : "none";
        }
        async function startCamera() {
          if (currentStream) {
            currentStream.getTracks().forEach((t) => t.stop());
          }
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: facingMode },
              audio: true,
            });
            applyStream(stream);
          } catch (err) {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode },
                audio: false,
              });
              applyStream(stream);
            } catch (err2) {
              camera.classList.add("hidden");
              cameraFallback.classList.remove("hidden");
              fallbackMsg.innerHTML =
                "Camera cannot be accessed.<br>Check camera permissions in your browser, then tap ⟲ to try again.";
            }
          }
        }
        flipCamBtn.addEventListener("click", () => {
          if (recording) return;
          facingMode = facingMode === "user" ? "environment" : "user";
          startCamera();
        });
        startCamera();

        // ---- Recording ----
        function pickMimeType() {
          if (typeof MediaRecorder === "undefined") return "";
          const candidates = [
            "video/mp4;codecs=avc1,mp4a.40.2",
            "video/mp4",
            "video/webm;codecs=vp9,opus",
            "video/webm;codecs=vp8,opus",
            "video/webm",
          ];
          return (
            candidates.find((type) => MediaRecorder.isTypeSupported(type)) ||
            ""
          );
        }
        function updateRecordUI() {
          recordBtn.classList.toggle("recording", recording);
          recordBtn.textContent = recording ? "■" : "⏺";
          recordBtn.setAttribute(
            "aria-label",
            recording ? "Stop recording" : "Record",
          );
        }
        function downloadRecording(blob) {
          const ext = blob.type.includes("mp4") ? "mp4" : "webm";
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `teleprompter-${Date.now()}.${ext}`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
        function startRecording() {
          if (!currentStream) {
            alert("Camera access is required to record.");
            return;
          }
          if (typeof MediaRecorder === "undefined") {
            alert("Recording is not supported in this browser.");
            return;
          }
          const mimeType = pickMimeType();
          try {
            mediaRecorder = mimeType
              ? new MediaRecorder(currentStream, { mimeType })
              : new MediaRecorder(currentStream);
          } catch (err) {
            alert("Recording is not supported in this browser.");
            return;
          }
          recordedChunks = [];
          mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) recordedChunks.push(e.data);
          };
          mediaRecorder.onstop = () => {
            if (recordedChunks.length) {
              const blob = new Blob(recordedChunks, {
                type: mediaRecorder.mimeType || "video/webm",
              });
              downloadRecording(blob);
            }
            recordedChunks = [];
          };
          mediaRecorder.start();
          recording = true;
          updateRecordUI();
        }
        function stopRecording() {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
          recording = false;
          updateRecordUI();
        }
        recordBtn.addEventListener("click", () => {
          if (recording) {
            stopRecording();
          } else {
            startRecording();
          }
        });

        // ---- Scroll animation ----
        function pxPerSecond() {
          // slider 1-20 -> roughly 10-260 px/s
          const v = parseInt(speedSlider.value, 10);
          return 8 + v * v * 0.6;
        }

        function step(ts) {
          if (!lastTs) lastTs = ts;
          const dt = (ts - lastTs) / 1000;
          lastTs = ts;
          if (playing) {
            scrollY -= pxPerSecond() * dt;
            track.style.transform = mirrorOn
              ? `scaleX(-1) translateY(${scrollY}px)`
              : `translateY(${scrollY}px)`;
          }
          rafId = requestAnimationFrame(step);
        }
        rafId = requestAnimationFrame(step);

        function updatePlayLabel() {
          playIcon.textContent = playing ? "❚❚" : "▶";
          playText.textContent = playing
            ? "Pause"
            : needsCountdown
              ? "Start"
              : "Play";
        }
        function setPlaying(state) {
          cancelCountdown();
          playing = state;
          lastTs = null;
          playBtn.classList.toggle("playing", playing);
          updatePlayLabel();
          tally.classList.toggle("live", playing);
          statusLabel.textContent = playing ? "Playing" : "Paused";
          if (playing) {
            scheduleHide();
          } else {
            showControls();
          }
        }
        function cancelCountdown() {
          if (countdownTimer) {
            clearInterval(countdownTimer);
            countdownTimer = null;
          }
          countdown.classList.remove("show");
          playBtn.disabled = false;
        }
        function startCountdown() {
          let count = 3;
          countdown.textContent = count;
          countdown.classList.add("show");
          playBtn.disabled = true;
          countdownTimer = setInterval(() => {
            count -= 1;
            if (count > 0) {
              countdown.textContent = count;
            } else {
              cancelCountdown();
              needsCountdown = false;
              setPlaying(true);
            }
          }, 1000);
        }
        playBtn.addEventListener("click", () => {
          if (playing) {
            setPlaying(false);
          } else if (needsCountdown) {
            startCountdown();
          } else {
            setPlaying(true);
          }
        });

        // reset scroll to top
        function resetScroll() {
          scrollY = 0;
          track.style.transform = mirrorOn
            ? "scaleX(-1) translateY(0px)"
            : "translateY(0px)";
        }
        restartBtn.addEventListener("click", () => {
          if (recording) stopRecording();
          needsCountdown = true;
          setPlaying(false);
          resetScroll();
        });

        // ---- Speed / size ----
        function applySpeed(raw) {
          const v = Math.min(20, Math.max(1, Math.round(raw)));
          speedSlider.value = v;
          speedInput.value = (v / 6).toFixed(1);
        }
        speedSlider.addEventListener("input", () =>
          applySpeed(speedSlider.value),
        );
        speedInput.addEventListener("change", () => {
          const parsed = parseFloat(speedInput.value);
          if (Number.isNaN(parsed)) {
            applySpeed(speedSlider.value);
            return;
          }
          applySpeed(parsed * 6);
        });

        function applySize(v) {
          const size = Math.min(64, Math.max(18, Math.round(v)));
          scriptText.style.fontSize = size + "px";
          sizeInput.value = size;
          sizeInput2.value = size;
          sizeSlider.value = size;
          sizeSlider2.value = size;
        }
        sizeSlider.addEventListener("input", () => applySize(sizeSlider.value));
        sizeSlider2.addEventListener("input", () =>
          applySize(sizeSlider2.value),
        );
        sizeInput.addEventListener("change", () => {
          const parsed = parseInt(sizeInput.value, 10);
          applySize(Number.isNaN(parsed) ? sizeSlider.value : parsed);
        });
        sizeInput2.addEventListener("change", () => {
          const parsed = parseInt(sizeInput2.value, 10);
          applySize(Number.isNaN(parsed) ? sizeSlider2.value : parsed);
        });
        applySize(32);
        applySpeed(speedSlider.value);

        // ---- +/- steppers (compact landscape mode) ----
        document.querySelectorAll(".stepper-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const input = document.getElementById(btn.dataset.target);
            const step = parseFloat(input.step) || 1;
            const delta = parseFloat(btn.dataset.delta) * step;
            const min = parseFloat(input.min);
            const max = parseFloat(input.max);
            const next = Math.min(
              max,
              Math.max(min, parseFloat(input.value) + delta),
            );
            input.value = step < 1 ? next.toFixed(1) : next;
            input.dispatchEvent(new Event("change"));
          });
        });

        // ---- Mirror ----
        let mirrorOn = false;
        mirrorBtn.addEventListener("click", () => {
          mirrorOn = !mirrorOn;
          mirrorBtn.classList.toggle("active", mirrorOn);
          track.style.transform = mirrorOn
            ? `scaleX(-1) translateY(${scrollY}px)`
            : `translateY(${scrollY}px)`;
        });

        // ---- Guide line ----
        let guideOn = false;
        guideBtn.addEventListener("click", () => {
          guideOn = !guideOn;
          guide.classList.toggle("on", guideOn);
          guideBtn.classList.toggle("active", guideOn);
        });

        // ---- Editor ----
        function openEditor() {
          if (recording) stopRecording();
          setPlaying(false);
          scriptInput.value =
            scriptText.textContent ===
            "Tap the pencil icon below to paste your script here."
              ? ""
              : scriptText.textContent;
          editor.classList.add("open");
          setTimeout(() => scriptInput.focus(), 300);
        }
        function closeEditor() {
          const val = scriptInput.value.trim();
          scriptText.textContent = val.length
            ? val
            : "Tap the pencil icon below to paste your script here.";
          editor.classList.remove("open");
          needsCountdown = true;
          resetScroll();
          updatePlayLabel();
        }
        editBtn.addEventListener("click", openEditor);
        doneBtn.addEventListener("click", closeEditor);

        // ---- Load from document (.txt / .md / .docx) ----
        function showLoadError(msg) {
          loadError.textContent = msg;
          loadError.classList.add("show");
        }
        function clearLoadError() {
          loadError.textContent = "";
          loadError.classList.remove("show");
        }
        loadBtn.addEventListener("click", () => {
          clearLoadError();
          fileInput.click();
        });

        // Minimal ZIP central-directory reader, just enough to pull a single
        // entry (word/document.xml) out of a .docx package without a library.
        async function readZipEntry(buffer, entryName) {
          const view = new DataView(buffer);
          const bytes = new Uint8Array(buffer);
          const maxBack = Math.min(bytes.length, 65557);
          let eocdOffset = -1;
          for (let i = bytes.length - 22; i >= bytes.length - maxBack; i--) {
            if (i < 0) break;
            if (view.getUint32(i, true) === 0x06054b50) {
              eocdOffset = i;
              break;
            }
          }
          if (eocdOffset === -1) throw new Error("Not a valid .docx file.");
          const cdCount = view.getUint16(eocdOffset + 10, true);
          let offset = view.getUint32(eocdOffset + 16, true);
          let match = null;
          for (let i = 0; i < cdCount; i++) {
            if (view.getUint32(offset, true) !== 0x02014b50) break;
            const compMethod = view.getUint16(offset + 10, true);
            const compSize = view.getUint32(offset + 20, true);
            const nameLen = view.getUint16(offset + 28, true);
            const extraLen = view.getUint16(offset + 30, true);
            const commentLen = view.getUint16(offset + 32, true);
            const localHeaderOffset = view.getUint32(offset + 42, true);
            const name = new TextDecoder("utf-8").decode(
              bytes.subarray(offset + 46, offset + 46 + nameLen),
            );
            if (name === entryName) {
              match = { compMethod, compSize, localHeaderOffset };
              break;
            }
            offset += 46 + nameLen + extraLen + commentLen;
          }
          if (!match) return null;
          const lh = match.localHeaderOffset;
          const lhNameLen = view.getUint16(lh + 26, true);
          const lhExtraLen = view.getUint16(lh + 28, true);
          const dataStart = lh + 30 + lhNameLen + lhExtraLen;
          const compData = bytes.subarray(dataStart, dataStart + match.compSize);
          if (match.compMethod === 0) return compData;
          if (match.compMethod !== 8) {
            throw new Error("Unsupported compression in .docx file.");
          }
          if (typeof DecompressionStream === "undefined") {
            throw new Error(
              "This browser can't read .docx files. Please export as .txt instead.",
            );
          }
          const stream = new Blob([compData])
            .stream()
            .pipeThrough(new DecompressionStream("deflate-raw"));
          return new Uint8Array(await new Response(stream).arrayBuffer());
        }

        async function extractDocxText(file) {
          const buffer = await file.arrayBuffer();
          const xmlBytes = await readZipEntry(buffer, "word/document.xml");
          if (!xmlBytes) throw new Error("That .docx file looks corrupted.");
          const xmlText = new TextDecoder("utf-8").decode(xmlBytes);
          const xmlDoc = new DOMParser().parseFromString(
            xmlText,
            "application/xml",
          );
          const ns =
            "http://schemas.openxmlformats.org/wordprocessingml/2006/main";
          const paragraphs = xmlDoc.getElementsByTagNameNS(ns, "p");
          const lines = [];
          const collect = (node) => {
            let text = "";
            for (const child of node.childNodes) {
              if (child.nodeType !== 1) continue;
              if (child.namespaceURI === ns && child.localName === "t") {
                text += child.textContent;
              } else if (child.namespaceURI === ns && child.localName === "tab") {
                text += "\t";
              } else if (child.namespaceURI === ns && child.localName === "br") {
                text += "\n";
              } else {
                text += collect(child);
              }
            }
            return text;
          };
          for (const p of paragraphs) lines.push(collect(p));
          return lines.join("\n\n");
        }

        fileInput.addEventListener("change", async () => {
          const file = fileInput.files[0];
          fileInput.value = "";
          if (!file) return;
          const name = file.name.toLowerCase();
          if (name.endsWith(".docx")) {
            try {
              const text = await extractDocxText(file);
              clearLoadError();
              scriptInput.value = text;
            } catch (err) {
              showLoadError(err.message || "Could not read that .docx file.");
            }
            return;
          }
          if (!name.endsWith(".txt") && !name.endsWith(".md")) {
            showLoadError("Only .txt, .md, or .docx files are supported.");
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            clearLoadError();
            scriptInput.value = reader.result;
          };
          reader.onerror = () => {
            showLoadError("Could not read that file. Please try again.");
          };
          reader.readAsText(file);
        });

        // ---- Auto-hide controls while playing ----
        function showControls() {
          controlsVisible = true;
          topbar.classList.remove("hide");
          dock.classList.remove("hide");
          clearTimeout(hideTimer);
          if (playing) scheduleHide();
        }
        function scheduleHide() {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            controlsVisible = false;
            topbar.classList.add("hide");
            dock.classList.add("hide");
          }, 2600);
        }
        stage.addEventListener("click", () => {
          if (controlsVisible && playing) {
            topbar.classList.add("hide");
            dock.classList.add("hide");
            controlsVisible = false;
            clearTimeout(hideTimer);
          } else {
            showControls();
          }
        });

        // ---- Fullscreen ----
        fullscreenBtn.addEventListener("click", () => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().catch(() => {});
          } else {
            document.exitFullscreen?.();
          }
        });

        // ---- Keyboard shortcuts ----
        document.addEventListener("keydown", (e) => {
          if (editor.classList.contains("open")) return;
          const tag = document.activeElement.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA") return;
          if (e.code === "Space") {
            e.preventDefault();
            playBtn.click();
          } else if (e.key.toLowerCase() === "r") {
            restartBtn.click();
          }
        });

        // Reset scroll on double tap
        let lastTap = 0;
        document.addEventListener("touchend", () => {
          const now = Date.now();
          if (now - lastTap < 300) {
            resetScroll();
          }
          lastTap = now;
        });
      })();
    </script>
  </body>
</html>
